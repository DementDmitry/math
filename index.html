<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Квадратные уравнения</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f0f4f8; min-height: 100vh; padding: 20px; }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 6px; font-size: 24px; }
    .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
    select, button { padding: 8px 16px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; cursor: pointer; }
    .btn-new { background: #3498db; color: #fff; border: none; }
    .btn-show { background: #27ae60; color: #fff; border: none; }
    .btn-hide { background: #e74c3c; color: #fff; border: none; }
    button:hover { opacity: 0.85; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 720px; margin: 0 auto; }
    @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .card-num { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .problem { font-size: 20px; font-weight: bold; color: #2c3e50; font-family: monospace; margin-bottom: 12px; }
    .btn-toggle { font-size: 12px; padding: 5px 14px; background: #3498db; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .btn-toggle.open { background: #bdc3c7; color: #333; }
    .answer { margin-top: 10px; color: #27ae60; font-weight: bold; font-size: 15px; }
    .hint { margin-top: 4px; color: #999; font-size: 12px; }
    label { font-size: 14px; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>

<h1>📐 Квадратные уравнения</h1>
<p class="subtitle">Реши уравнения вида ax² + bx + c = 0</p>

<div class="controls">
  <label>
    Задач:
    <select id="countSel">
      <option value="4">4</option>
      <option value="6" selected>6</option>
      <option value="8">8</option>
      <option value="10">10</option>
      <option value="12">12</option>
    </select>
  </label>
  <button class="btn-new" onclick="regenerate()">🔄 Новые задачи</button>
  <button class="btn-show" onclick="showAll()">Показать все ответы</button>
  <button class="btn-hide" onclick="hideAll()">Скрыть все ответы</button>
</div>

<div class="grid" id="grid"></div>

<script>
function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }

function fraction(n, d) {
  if (d === 0) return null;
  const g = gcd(Math.abs(n), Math.abs(d));
  let nn = n / g, dd = d / g;
  if (dd < 0) { nn = -nn; dd = -dd; }
  if (dd === 1) return String(nn);
  return nn + "/" + dd;
}

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randNZ(a, b) { let v; do { v = randInt(a, b); } while (v === 0); return v; }

function fmtFactor(a, b) {
  const sign = b >= 0 ? "+" : "−";
  const abs = Math.abs(b);
  if (a === 1) return b === 0 ? "x" : "(x " + sign + " " + abs + ")";
  return b === 0 ? a + "x" : "(" + a + "x " + sign + " " + abs + ")";
}

function generate() {
  const types = ["factored_zero","factored_nonzero","standard","with_x","move_terms"];
  const type = types[randInt(0, types.length - 1)];

  if (type === "factored_zero") {
    const a1 = randInt(1,3), b1 = randNZ(-8,8);
    const a2 = randInt(1,3), b2 = randNZ(-8,8);
    return {
      problem: fmtFactor(a1,b1) + fmtFactor(a2,b2) + " = 0",
      solutions: [fraction(-b1,a1), fraction(-b2,a2)],
      hint: "Приравняй каждый множитель к 0"
    };
  }

  if (type === "factored_nonzero") {
    const b1 = randNZ(-6,6), b2 = randNZ(-6,6), k = randNZ(-20,20);
    const B = b1+b2, C = b1*b2-k;
    const disc = B*B - 4*C;
    if (disc < 0 || Math.sqrt(disc)%1 !== 0) return generate();
    const sq = Math.sqrt(disc);
    const s1sign = b1>=0?"+":"−", s2sign = b2>=0?"+":"−";
    return {
      problem: "(x " + s1sign + " " + Math.abs(b1) + ")(x " + s2sign + " " + Math.abs(b2) + ") = " + k,
      solutions: [fraction(-B+sq,2), fraction(-B-sq,2)],
      hint: "Раскрой скобки, перенеси всё в одну сторону"
    };
  }

  if (type === "standard") {
    const r1 = randInt(-8,8), r2 = randInt(-8,8), a = randInt(1,3);
    const B = -a*(r1+r2), C = a*r1*r2;
    const bStr = B===0?"": " "+(B>0?"+":"−")+" "+Math.abs(B)+"x";
    const cStr = C===0?"": " "+(C>0?"+":"−")+" "+Math.abs(C);
    const aStr = a===1?"":a;
    return {
      problem: aStr + "x²" + bStr + cStr + " = 0",
      solutions: [String(r1), String(r2)],
      hint: "Дискриминант: D = b² − 4ac"
    };
  }

  if (type === "with_x") {
    const a = randInt(1,3), b = randNZ(-8,8), c = randNZ(-12,12);
    const disc = b*b + 4*a*c;
    if (disc < 0 || Math.sqrt(disc)%1 !== 0) return generate();
    const sq = Math.sqrt(disc);
    const bSign = b>=0?"+":"−";
    const aStr = a===1?"":a;
    return {
      problem: "x(" + aStr + "x " + bSign + " " + Math.abs(b) + ") = " + c,
      solutions: [fraction(-b+sq,2*a), fraction(-b-sq,2*a)],
      hint: "Раскрой скобки, перенеси c"
    };
  }

  // move_terms
  const r1 = randInt(-6,6), r2 = randInt(-6,6), a = randInt(1,2);
  const B = -a*(r1+r2), C = a*r1*r2;
  const b1 = randInt(-5,5), b2 = b1-B, d = -C;
  const aStr = a===1?"":a;
  const lSign = b1>=0?"+":"−";
  const rSign = b2>=0?"":"−";
  const dSign = d>=0?"+":"−";
  return {
    problem: aStr+"x² "+lSign+" "+Math.abs(b1)+"x = "+rSign+Math.abs(b2)+"x "+dSign+" "+Math.abs(d),
    solutions: [String(r1), String(r2)],
    hint: "Перенеси все члены в одну сторону"
  };
}

let problems = [];

function regenerate() {
  const n = +document.getElementById("countSel").value;
  problems = Array.from({length: n}, generate);
  render();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  problems.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + i;
    card.innerHTML = `
      <div class="card-num">Задача ${i+1}</div>
      <div class="problem">${p.problem}</div>
      <button class="btn-toggle" onclick="toggle(${i})">Показать ответ</button>
      <div class="answer" id="ans-${i}" style="display:none">
        x = ${p.solutions[0] === p.solutions[1] ? p.solutions[0] : p.solutions[0] + " &nbsp;|&nbsp; x = " + p.solutions[1]}
      </div>
      <div class="hint" id="hint-${i}" style="display:none">💡 ${p.hint}</div>
    `;
    grid.appendChild(card);
  });
}

function toggle(i) {
  const ans = document.getElementById("ans-"+i);
  const hint = document.getElementById("hint-"+i);
  const btn = document.querySelector("#card-"+i+" .btn-toggle");
  const visible = ans.style.display !== "none";
  ans.style.display = visible ? "none" : "block";
  hint.style.display = visible ? "none" : "block";
  btn.textContent = visible ? "Показать ответ" : "Скрыть ответ";
  btn.className = visible ? "btn-toggle" : "btn-toggle open";
}

function showAll() {
  problems.forEach((_,i) => {
    document.getElementById("ans-"+i).style.display = "block";
    document.getElementById("hint-"+i).style.display = "block";
    const btn = document.querySelector("#card-"+i+" .btn-toggle");
    btn.textContent = "Скрыть ответ"; btn.className = "btn-toggle open";
  });
}

function hideAll() {
  problems.forEach((_,i) => {
    document.getElementById("ans-"+i).style.display = "none";
    document.getElementById("hint-"+i).style.display = "none";
    const btn = document.querySelector("#card-"+i+" .btn-toggle");
    btn.textContent = "Показать ответ"; btn.className = "btn-toggle";
  });
}

regenerate();
</script>
</body>
</html>
